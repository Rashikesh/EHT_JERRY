services:
  - type: web
    name: industrial-safety-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn core.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MQTT_BROKER
        sync: false
      - key: MQTT_PORT
        value: "8883"
      - key: MQTT_USERNAME
        sync: false
      - key: MQTT_PASSWORD
        sync: false
      - key: FRONTEND_URL
        sync: false